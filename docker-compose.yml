services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-pulse
    restart: always
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    networks:
      - app
    expose:
      - ${APP_PORT}

